<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>500 - Error del servidor | Carlos Molina</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Inter:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --color-bg: #050505;
            --color-text: #EDEDED;
            --color-accent: #C9A962;
            --color-muted: #666;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--color-bg);
            color: var(--color-text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }

        .container {
            max-width: 500px;
        }

        .error-code {
            font-family: 'Playfair Display', serif;
            font-size: clamp(4rem, 15vw, 8rem);
            color: var(--color-accent);
            line-height: 1;
            margin-bottom: 1rem;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 400;
            margin-bottom: 1rem;
        }

        p {
            color: var(--color-muted);
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .btn {
            display: inline-block;
            padding: 0.875rem 2rem;
            background: var(--color-accent);
            color: var(--color-bg);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.875rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            border-radius: 4px;
            transition: transform 0.2s, opacity 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }

        .btn:focus {
            outline: 2px solid var(--color-accent);
            outline-offset: 2px;
        }
    </style>
</head>

<body>
    <main class="container" role="main">
        <div class="error-code">500</div>
        <h1>Error del servidor</h1>
        <p>Algo salió mal de nuestro lado. Por favor, intenta nuevamente en unos momentos.</p>
        <a href="/" class="btn">Volver al inicio</a>
    </main>
</body>

</html>
